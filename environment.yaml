name: dmlap
channels:
  - pytorch
  - conda-forge
dependencies:
  - python
  - pip
  - numpy<2
  # PyTorch and torchvision must be compatible (e.g. 2.10 + 0.25). If you see "operator torchvision::nms does not exist", run: pip install "torchvision>=0.25"
  - pytorch
  - torchvision
  - torchaudio
  - pysoundfile
  - jupyter
  - matplotlib
  - opencv
  - pycairo
  - ollama
  - ollama-python
  - markdown
  - ruff
  - scikit-image
  - scikit-learn
  - gdown
  - gradio
  - transformers
  - diffusers
  - accelerate
  - pip:
    - strip-markdown
    - py5canvas
    - mediapipe
